<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asheville Airport Express</title>

  <meta
    name="description"
    content="Asheville Airport Express - 24/7 airport transportation by appointment. Call now or book online."
  />

  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --text: #ffffff;
      --muted: #b8c2d6;
      --accent: #d4af37;
      --accent-hover: #e6c65a;
      --radius: 20px;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .logo {
      width: min(100%, 420px);
      margin: 0 auto 26px;
      display: block;
      border-radius: 20px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 36px 28px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    h1 {
      font-size: 1.9rem;
      margin: 0 0 6px;
    }

    .sub {
      font-size: 1.05rem;
      color: #ccc;
      margin-bottom: 18px;
    }

    .lead {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .call-btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 999px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 1.15rem;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .call-btn:hover {
      background: var(--accent-hover);
    }

    .widget {
      width: 100%;
      height: 650px;
      border: none;
      border-radius: 16px;
      overflow: hidden;
    }

    .widget-title {
      margin-bottom: 14px;
      font-size: 1.2rem;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .logo {
        width: min(100%, 300px);
      }

      h1 {
        font-size: 1.6rem;
      }

      .widget {
        height: 600px;
      }
    }
  </style>

  <!-- Moovs Script -->
  <script>
    window["moovsAPI"] = moovsAPI = window["moovsAPI"] || [];
    moovsAPI.push(["operator", "d67a28ae-2916-11f1-ae3d-f714c215a04d"]);
    (function(m, oo, v, s) {
      s = m.createElement(oo);
      s.src = v;
      s.async = 1;
      m.head.appendChild(s);
    })(document, "script", "https://static.moovs.app");
  </script>

</head>

<body>
  <div class="wrap">

    <!-- LOGO -->
    <img
      src="./img/asheville_airport_express_logo.png"
      class="logo"
      alt="Asheville Airport Express"
    />

    <!-- TOP CARD -->
    <div class="card">

      <h1>Available 24/7</h1>
      <div class="sub">By Appointment</div>

      <div class="lead">
        Call to schedule your airport pickup or drop-off
      </div>

      <a href="tel:+18283977377" class="call-btn">
        Call 828-397-7377
      </a>

    </div>

    <!-- BOOKING CARD -->
    <div class="card">

      <div class="widget-title">Book Online</div>

      <iframe
        src="https://customer.moovs.app/airport-express-llc/iframe"
        class="widget"
        title="Book a Ride"
      ></iframe>

    </div>

  </div>
</body>
</html>
