  <style>
    :root {
      --bg: #0b1220;
      --text: #ffffff;
      --muted: #b8c2d6;
      --accent: #d4af37;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .logo {
      width: min(100%, 380px);
      margin: 0 auto 18px;
      display: block;
      border-radius: 18px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 26px 22px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.7rem;
    }

    .copy {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      padding: 16px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-secondary {
      margin-top: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      color: #fff;
    }

    .footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
    }

    .booking-modal {
      display: none;
      position: fixed;
      z-index: 9999;
      inset: 0;
      background: rgba(0,0,0,0.85);
    }

    .booking-modal-content {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 12px;
    }

    .widget-frame {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 16px;
      display: block;
      background: #fff;
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 18px;
      z-index: 10000;
      font-size: 22px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      line-height: 1;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .booking-modal-content {
        padding: 8px;
      }

      .close-btn {
        top: 10px;
        right: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <a href="/index.html">
      <img src="./img/asheville_airport_express_logo.png" class="logo" alt="Asheville Airport Express Logo" />
    </a>

    <div class="card">
      <h1>Book Airport Transportation</h1>

      <div class="copy">
        Complete your booking below. For immediate assistance, please call or text.
      </div>

      <button class="btn btn-primary" onclick="openBooking()">Book Now</button>
      <a href="/index.html" class="btn btn-secondary">Home</a>
    </div>

    <div class="footer">
      <a href="mailto:admin@airportexpress.us">admin@airportexpress.us</a>
    </div>

  </div>

  <!-- BOOKING MODAL -->
  <div id="bookingModal" class="booking-modal">
    <div class="booking-modal-content">
      <button class="close-btn" onclick="closeBooking()" aria-label="Close booking window">✕</button>
      <iframe
        src="https://customer.moovs.app/airport-express-llc/iframe"
        class="widget-frame"
        title="Book Asheville Airport Express online">
      </iframe>
    </div>
  </div>

  <script>
    function openBooking() {
      document.getElementById("bookingModal").style.display = "block";
    }

    function closeBooking() {
      document.getElementById("bookingModal").style.display = "none";
    }
  </script>
</body>
</html>
