  <style>
    :root {
      --bg: #0b1220;
      --text: #ffffff;
      --muted: #b8c2d6;
      --accent: #d4af37;
      --accent-hover: #e6c65a;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .logo {
      width: min(100%, 380px);
      margin: 0 auto 18px;
      display: block;
      border-radius: 18px;
    }

    .booking-shell {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .widget-frame {
      width: 100%;
      height: 820px;
      max-height: 820px;
      border: none;
      border-radius: 16px;
      display: block;
      background: #fff;
      overflow: hidden;
    }

    .button-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .btn {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      padding: 16px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1.05rem;
      text-decoration: none;
      text-align: center;
      border: none;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .widget-frame {
        height: 760px;
        max-height: 760px;
      }
    }

    @media (max-width: 420px) {
      .widget-frame {
        height: 700px;
        max-height: 700px;
      }
    }
  </style>

    </div>

    <div class="button-stack">
      <a href="/index.html" class="btn btn-secondary">Home</a>
    </div>

    <div class="note">
      Secure online booking is available through our booking form.
    </div>

    <div class="footer">
      <a href="mailto:admin@airportexpress.us">admin@airportexpress.us</a>
    </div>
  </div>
