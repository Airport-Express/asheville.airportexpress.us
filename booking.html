  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-667098794"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'AW-667098794');
    gtag('config', 'G-MJ918GX7BG');
  </script>

  <style>
    :root {
      --bg: #0b1220;
      --text: #ffffff;
      --muted: #b8c2d6;
      --accent: #d4af37;
      --accent-hover: #e6c65a;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 30px 24px 24px;
      box-shadow: var(--shadow);
    }

    .logo {
      width: min(100%, 380px);
      margin: 0 auto 22px;
      display: block;
      border-radius: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.9rem;
      line-height: 1.2;
    }

    .copy {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
      margin-bottom: 22px;
    }

    .button-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .btn {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      padding: 16px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1.05rem;
      text-decoration: none;
      text-align: center;
      border: none;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.82);
      padding: 24px;
      align-items: center;
      justify-content: center;
    }

    .modal.open {
      display: flex;
    }

    .modal-inner {
      position: relative;
      width: min(96vw, 980px);
      background: linear-gradient(180deg, rgba(17,26,43,0.98), rgba(11,18,32,0.98));
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      border: none;
      border-radius: 999px;
      width: 42px;
      height: 42px;
      font-size: 1.3rem;
      cursor: pointer;
      z-index: 2;
    }

    .widget-frame {
      width: 100%;
      height: 88vh;
      min-height: 620px;
      border: none;
      border-radius: 16px;
      display: block;
      background: #fff;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 24px 18px 20px;
      }

      h1 {
        font-size: 1.65rem;
      }

      .widget-frame {
        height: 82vh;
        min-height: 540px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <a href="/index.html" aria-label="Return to home">
        <img src="./img/asheville_airport_express_logo.png" class="logo" alt="Asheville Airport Express Logo" />
      </a>

      <h1>Book Airport Transportation</h1>

      <div class="copy">
        Reserve your ride with Asheville Airport Express using the secure online booking window below.
      </div>

      <div class="button-stack">
        <button id="openBooking" class="btn btn-primary" type="button">Book Now</button>
        <a href="/index.html" class="btn btn-secondary">Home</a>
      </div>

      <div class="note">
        If you close the booking window, use the buttons here to return home or reopen booking.
      </div>
    </div>

    <div class="footer">
      <a href="mailto:admin@airportexpress.us">admin@airportexpress.us</a>
    </div>
  </div>

  <div class="modal" id="bookingModal">
    <div class="modal-inner">
      <button class="modal-close" id="closeBooking" aria-label="Close booking window">&times;</button>
      <iframe
        src="https://customer.moovs.app/airport-express-llc/iframe"
        class="widget-frame"
        title="Book Asheville Airport Express online">
      </iframe>
    </div>
  </div>

  <script>
    const bookingModal = document.getElementById('bookingModal');
    const openBookingBtn = document.getElementById('openBooking');
    const closeBookingBtn = document.getElementById('closeBooking');

    function openBookingModal() {
      bookingModal.classList.add('open');

      // Replace BOOKING_CONVERSION with your real Google Ads conversion label if needed.
      gtag('event', 'conversion', {
        'send_to': 'AW-667098794/BOOKING_CONVERSION'
      });
    }

    openBookingBtn.addEventListener('click', function() {
      openBookingModal();
    });

    closeBookingBtn.addEventListener('click', function() {
      bookingModal.classList.remove('open');
    });

    bookingModal.addEventListener('click', function(e) {
      if (e.target === bookingModal) {
        bookingModal.classList.remove('open');
      }
    });
  </script>
</body>
</html>
