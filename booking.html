  <meta name="twitter:card" content="summary_large_image" />

  <meta name="twitter:description" content="Book reliable airport transportation with Asheville Airport Express." />

  <style>
    :root {
      --bg: #0b1220;
      --text: #ffffff;
      --muted: #b8c2d6;
      --accent: #d4af37;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .logo {
      width: min(100%, 380px);
      margin: 0 auto 18px;
      display: block;
      border-radius: 18px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 18px;
    }

    .btn {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      border-radius: 999px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--line);
      color: #fff;
    }

    .footer {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* MODAL */
    .booking-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .booking-modal.show {
      opacity: 1;
    }

    .booking-modal-content {
      width: 95%;
      max-width: 520px;
      height: 85vh;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .widget-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      cursor: pointer;
      z-index: 10000;
    }
  </style>
</head>

<body>

<div class="wrap">

  <a href="/index.html">
    <img src="./img/asheville_airport_express_logo.png" class="logo" />
  </a>

  <div class="card">
    <h1>Book Airport Transportation</h1>
    <p>Complete your booking below or use the button if the window is closed.</p>

    <button class="btn btn-primary" onclick="openBooking()">Book Now</button>
    <a href="/index.html" class="btn btn-secondary">Home</a>
  </div>

  <div class="footer">
    <a href="mailto:admin@airportexpress.us">admin@airportexpress.us</a>
  </div>

</div>

<!-- MODAL -->
<div id="bookingModal" class="booking-modal">
  <div class="booking-modal-content">
    <button class="close-btn" onclick="closeBooking()">✕</button>

    <iframe
      src="https://customer.moovs.app/airport-express-llc/iframe"
      class="widget-frame"
      title="Booking">
    </iframe>
  </div>
</div>

<script>
function openBooking() {
  const modal = document.getElementById("bookingModal");
  modal.style.display = "flex";
}

function closeBooking() {
  const modal = document.getElementById("bookingModal");
  modal.style.display = "none";
}

/* AUTO OPEN */
window.onload = function() {
  openBooking();
};
</script>

</body>
</html>
